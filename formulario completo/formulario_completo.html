<!DOCTYPE html>
<html>

<head>
<title>Formulario de Inscripción</title>
<link rel="stylesheet" href="formulario_completo.css">
</head>

<body>

<h1>Formulario de Inscripción</h1>

<form id="miFormulario">

<table>

<tr>
<td>Tipo de documento</td>
<td>
<select name="tipo_documento">
<option>Cédula</option>
<option>Tarjeta de identidad</option>
<option>Pasaporte</option>
</select>
</td>
</tr>

<tr>
<td>Número de documento</td>
<td>
<input type="text" name="documento" pattern="[0-9]{6,12}" required>
</td>
</tr>

<tr>
<td>Nombres</td>
<td>
<input type="text" name="nombres"
minlength="3"
maxlength="64"
pattern="[A-Za-zÁÉÍÓÚáéíóú ]{3,64}"
required>
</td>
</tr>

<tr>
<td>Apellidos</td>
<td>
<input type="text" name="apellidos"
minlength="3"
maxlength="64"
pattern="[A-Za-zÁÉÍÓÚáéíóú ]{3,64}"
required>
</td>
</tr>

<tr>
<td>Dirección</td>
<td>
<input type="text" name="direccion" required>
</td>
</tr>

<tr>
<td>Teléfono fijo</td>
<td>
<input type="tel" name="telefono_fijo"
pattern="[0-9]{7,10}">
</td>
</tr>

<tr>
<td>Teléfono celular</td>
<td>
<input type="tel" name="celular"
pattern="[0-9]{10}"
required>
</td>
</tr>

<tr>
<td>Correo electrónico</td>
<td>
<input type="email" name="correo" required>
</td>
</tr>

<tr>
<td>Usuario</td>
<td>
<input type="text" name="usuario"
pattern="[A-Za-z]{3,14}[0-9]{0,2}"
title="Entre 3 y 16 letras con máximo 2 números al final"
required>
</td>
</tr>

<tr>
<td>Password</td>
<td>
<input type="password" name="password"
pattern="(?=(.*[A-Z]){1,})(?=(.*[a-z]){2,})(?=(.*[0-9]){5,})[A-Za-z0-9!?\-+/&$]{1,16}"
title="Debe tener 1 mayúscula, 2 minúsculas, 5 números y puede usar !?-+/&$"
required>
</td>
</tr>

<tr>
<td>Fecha de inscripción</td>
<td>
<input type="date"
min="2026-02-15"
max="2026-03-06"
required>
</td>
</tr>

<tr>
<td>Hobbies</td>
<td>

<input type="checkbox"> Deportes<br>
<input type="checkbox"> Videojuegos<br>
<input type="checkbox"> Música<br>
<input type="checkbox"> Programar<br>
<input type="checkbox"> Otros<br>

</td>
</tr>

<tr>
<td colspan="2" align="center">

<input type="submit" value="Enviar">
<input type="reset" value="Limpiar">

</td>
</tr>

</table>

</form>

<script src="formulario_completo.js"></script>

</body>
</html>
